name: Sniper Userbot

on:
  schedule:
    # ⚠️ AJUSTE DE HORÁRIO AQUI ⚠️
    # O Cron usa UTC. Brasil está em UTC-3.
    # Se o jogo é às 20:30 BR, o bot deve ligar às 20:20 BR.
    # 20:20 BR = 23:20 UTC.
    # Quinta-feira = 4
    - cron: '20 23 * * 4' 
  
  # Permite testar clicando num botão
  workflow_dispatch:

jobs:
  run-sniper:
    runs-on: ubuntu-latest
    # Garante que ele não morra antes da hora (aguenta até 20 min)
    timeout-minutes: 20 
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Instalar libs
        run: pip install -r requirements.txt

      - name: Disparar Sniper
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SESSION_ANNE: ${{ secrets.SESSION_ANNE }}
          SESSION_THAIANE: ${{ secrets.SESSION_THAIANE }}
          SESSION_ADRIELLI: ${{ secrets.SESSION_ADRIELLI }}
          SESSION_SARA: ${{ secrets.SESSION_SARA }}
          SESSION_VANESSA: ${{ secrets.SESSION_VANESSA }}
          SESSION_ISABELLA: ${{ secrets.SESSION_ISABELLA }}
          SESSION_STEFFANI: ${{ secrets.SESSION_STEFFANI }}
          SESSION_NATALIA: ${{ secrets.SESSION_NATALIA }}
          SESSION_THAINA: ${{ secrets.SESSION_THAINA }}
          SESSION_LUCIANA: ${{ secrets.SESSION_LUCIANA }}
          SESSION_PALOMA: ${{ secrets.SESSION_PALOMA }}

        run: |
          # Define fuso horário de SP para o Python saber a hora certa
          export TZ="America/Sao_Paulo"
          python main.py